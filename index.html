<!doctype html>
<html lang="en" class="bg-[#0d0c0a]">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Marcus Boni — Software Engineer</title>
    <meta name="title" content="Marcus Boni — Software Engineer" />

      name="description"
      content="Marcus Boni — Brazilian software engineer crafting robust, modern web applications. React, TypeScript, Next.js, and backend solutions."

    <link rel="canonical" href="https://marcusboni.com.br/" />
    <meta name="theme-color" content="#0d0c0a" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://marcusboni.com.br/" />
    <meta property="og:title" content="Marcus Boni — Software Engineer" />
    <meta
      property="og:description"
      content="Brazilian software engineer crafting robust, modern web applications."
    />
    <meta property="og:image" content="https://marcusboni.com.br/og-image.png" />
    <meta property="og:site_name" content="Marcus Boni — Portfolio" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://marcusboni.com.br/" />
    <meta property="twitter:title" content="Marcus Boni — Software Engineer" />
    <meta
      property="twitter:description"
      content="Brazilian software engineer crafting robust, modern web applications."
    />
    <meta property="twitter:image" content="https://marcusboni.com.br/og-image.png" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Marcus Boni",
        "alternateName": "Marcus Evandro Galvão Boni",
        "url": "https://marcusboni.com.br",
        "jobTitle": "Software Engineer",
        "knowsAbout": [
          "Software Engineering",
          "Web Development",
          "React",
          "TypeScript",
          "Next.js",
          "Node.js",
          "C#",
          "PostgreSQL",
          "Docker",
          "Azure",
          "Azure DevOps"
        ],
        "sameAs": [
          "https://github.com/Marcus-Boni",
          "https://www.linkedin.com/in/marcus-boni-729a52243"
        ],
        "email": "mgalvaoboni@gmail.com",
        "nationality": {
          "@type": "Country",
          "name": "Brazil"
        }
      }
    </script>
  </head>
  <body>
    <div id="root">
      <!--
        Static hero shell: painted from HTML+CSS alone so the largest text
        (the LCP element) renders long before the JS bundle executes on slow
        devices. React replaces this entire subtree on mount and re-runs the
        intro animation over it. Keep classes in sync with Hero.tsx.
      -->
      <section
        class="relative flex h-svh flex-col justify-end overflow-hidden"
        aria-label="Apresentação"
      >
        <div
          aria-hidden="true"
          class="absolute inset-0"
          style="
            background: radial-gradient(
              120% 90% at 70% 20%,
              #1c1815 0%,
              #0d0c0a 60%
            );
          "
        ></div>
        <div class="relative z-10 px-5 pb-10 md:px-8 md:pb-14 lg:pl-24">
          <p
            class="mb-4 max-w-md font-mono text-[11px] leading-relaxed tracking-[0.18em] text-bone-dim uppercase md:mb-6"
          >
            Engenheiro de software construindo aplicações web robustas e
            modernas
          </p>
          <h1 class="flex flex-col" aria-label="Marcus Boni">
            <span
              class="wdth-expanded font-sans text-giant leading-[0.86] font-bold tracking-tight uppercase"
              >Marcus</span
            >
            <span class="flex items-baseline gap-[0.12em]">
              <span
                class="font-display-italic text-giant leading-[0.92] text-ember"
                >Boni</span
              >
            </span>
          </h1>
          <div
            class="mt-8 flex items-end justify-between border-t border-line pt-5"
          >
            <p
              class="max-w-xs font-sans text-sm leading-relaxed text-bone-dim md:max-w-sm md:text-base"
            >
              React · TypeScript · Next.js — e a disciplina de quem trata cada
              projeto como produto.
            </p>
          </div>
        </div>
      </section>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
